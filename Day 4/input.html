<!doctype html>
<html lang="en">
  <head>
    <title>Input</title>
  </head>
  <body>
    <form>
      <label for="op">Select your country</label>
      <select name="nation" id="op">
        <option value="hindustan">india</option>
        <option value="pakistan">pakistan</option>
        <option value="srilank">srilank</option>
        <option value="england">england</option>
        <option value="germany" selected>germany</option>
      </select>
      <br /><br>
      <label for="f">Give your feedback</label>
      <br />
      <textarea name="feedback" id="f" rows="10" col="50"></textarea>
      <br />
      <input type="submit" />
    </form>
  </body>
</html>
