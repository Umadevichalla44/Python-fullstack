<!DOCTYPE html>
<html lang="en">
<head>
    <title>List</title>
</head>
<body>
    <h2>Orderd list:</h2>\
    <ol>
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
    </ol>
    <h2>Unorderd list:</h2>\
    <ul>
        <li>cat</li>
        <li>dog</li>
        <li>bag</li>
        <li>bat</li>
    </ul>
</body>
</html>
