<!DOCTYPE html>
<html lang="en">
<head>
    <title>semantic tag</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    padding: 20px;
    background-color: #FFE8B4;
}

/* Header */
header{
    background-color: #5E244E;
    color: white;
    text-align: center;
    padding: 20px;
    margin-bottom: 10px;
    border-radius: 8px;
}

/* Navigation */
nav{
    background-color: #AA1C41;
    color: white;
    text-align: center;
    padding: 20px;
    margin-bottom: 10px;
    border-radius: 8px;
}

/* Main Layout */
main{
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

/* Left Side */
.child{
    width: 55%;
}

/* Section */
section{
    background-color: #E68457;
    color: white;
    text-align: center;
    padding: 50px;
    margin-bottom: 10px;
    border-radius: 8px;
}

/* Article */
article{
    background-color: #AA1C41;
    color: white;
    text-align: center;
    padding: 50px;
    border-radius: 8px;
}

/* Right Side */
.child2{
    width: 75%;
}

/* Aside */
aside{
    background-color: #5E244E;
    color: white;
    text-align: center;
    padding: 120px 20px;
    border-radius: 8px;
    align-items: bootom right;
}

/* Footer */
footer{
    background-color: #E68457;
    color: white;
    text-align: center;
    padding: 20px;
    border-radius: 8px;
}
    </style>
</head>
<body>
    <header><h1>Header</h1></header>
    <nav><h1>Navigationbar</h1></nav>
    <main>
        <div class="child1">
            <section><h1>section</h1></section>
            <article><h1>artical</h1></article>
        </div>
        <div class="child2">
            <aside><h1>Aside</h1></aside>
        </div>
    </main>
    <footer><h1>Footer</h1></footer>
</body>
</html>
