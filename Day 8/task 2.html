<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        li {
            list-style-type: disc;
        }
        li:nth-child(3) {
            color: red;      
        }
        li:first-child {
            color: blue;
        }
        li:list-child {
            color: green;
        }
    </style>
</head>
<body>
    <ul>
        <li>list item one</li>
        <li>list item two</li>
        <li>list item three</li>
        <li>list item four</li>
        <li>list item five</li>
    </ul>
</body>
</html>
