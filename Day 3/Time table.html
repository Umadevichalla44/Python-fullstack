!doctype html>
<html lang="en">
  <head>
    <title>Time Table</title>
  </head>
  <body>
    <table border="2">
      <tr>
        <th colspan="8">Time Table</th>
      </tr>
      <tr>
        <th>Days</th>
        <th>9:00to10:00</th>
        <th>10:00to11:00</th>
        <th>11:00to12:00</th>
        <th>12:00to1:00</th>
        <th>1:00to2:00</th>
        <th>2:00to3:00</th>
        <th>3:00to4:00</th>
      </tr>
      <tr>
        <th>Mon</th>
        <td>OS</td>
        <td>AI</td>
        <td>ML</td>
        <td rowspan="6" align="center">L<br />U<br />N<br />C<br />H</td>
        <td colspan="3" align="center">AI LAB</td>
      </tr>
      <tr>
        <th>Tue</th>
        <td colspan="2" align="center">CN</td>
        <td>LIBRARY</td>
        <td>DBMS</td>
        <td>AI</td>
        <td>COA</td>
      </tr>
      <tr>
        <th>Wed</th>
        <td>DAA</td>
        <td>CN</td>
        <td>ML</td>
        <td>OS</td>
        <td colspan="2" align="center">ML LAB</td>
      </tr>
      <tr>
        <th>Thus</th>
        <td colspan="3" align="center">CN LAB</td>
        <td>DBMS</td>
        <td>DAA</td>
        <td>LIBRARY</td>
      </tr>
      <tr>
        <th>Fri</th>
        <td>ML</td>
        <td>AI</td>
        <td>COA</td>
        <td colspan="3" align="center">PYTHON LAB</td>
      </tr>
      <tr>
        <th>Sat</th>
        <td colspan="2" align="center">OS LAB</td>
        <td>LIBRARY</td>
        <td>DAA</td>
        <td colspan="2" align="center">SPORT</td>
      </tr>
    </table>
  </body>
</html>
